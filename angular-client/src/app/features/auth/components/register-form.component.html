<form (ngSubmit)="onSubmit()" class="flex flex-col gap-4 p-8 bg-white rounded-lg shadow-md w-full max-w-md">
  <div class="flex flex-col gap-1">
    <label for="username" class="font-semibold text-gray-700">{{ 'REGISTER.USERNAME' | translate }}</label>
    <input
      id="username"
      type="text"
      [(ngModel)]="dto.username"
      name="username"
      [placeholder]="'REGISTER.USERNAME_PLACEHOLDER' | translate"
      required
      class="px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
    />
  </div>

  <div class="flex gap-3">
    <div class="flex flex-col gap-1 flex-1">
      <label for="firstName" class="font-semibold text-gray-700">{{ 'REGISTER.FIRST_NAME' | translate }}</label>
      <input
        id="firstName"
        type="text"
        [(ngModel)]="dto.firstName"
        name="firstName"
        [placeholder]="'REGISTER.FIRST_NAME_PLACEHOLDER' | translate"
        required
        class="px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      />
    </div>
    <div class="flex flex-col gap-1 flex-1">
      <label for="lastName" class="font-semibold text-gray-700">{{ 'REGISTER.LAST_NAME' | translate }}</label>
      <input
        id="lastName"
        type="text"
        [(ngModel)]="dto.lastName"
        name="lastName"
        [placeholder]="'REGISTER.LAST_NAME_PLACEHOLDER' | translate"
        required
        class="px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      />
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label for="email" class="font-semibold text-gray-700">{{ 'REGISTER.EMAIL' | translate }}</label>
    <input
      id="email"
      type="email"
      [(ngModel)]="dto.email"
      name="email"
      [placeholder]="'REGISTER.EMAIL_PLACEHOLDER' | translate"
      required
      class="px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
    />
  </div>

  <div class="flex flex-col gap-1">
    <label for="password" class="font-semibold text-gray-700">{{ 'REGISTER.PASSWORD' | translate }}</label>
    <div class="relative">
      <input
        id="password"
        [type]="showPassword ? 'text' : 'password'"
        [(ngModel)]="dto.password"
        name="password"
        [placeholder]="'REGISTER.PASSWORD_PLACEHOLDER' | translate"
        required
        class="w-full px-4 py-3 pr-12 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      />
      <button
        type="button"
        (click)="showPassword = !showPassword"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 cursor-pointer"
      >
        @if (showPassword) {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21" />
          </svg>
        }
      </button>
    </div>
  </div>

  @if (errorMessage) {
    <div class="text-sm text-red-600 bg-red-50 p-3 rounded-md">{{ errorMessage }}</div>
  }

  <div class="flex w-full justify-center">
    <app-language-switcher />
  </div>

  <button
    type="submit"
    [disabled]="isLoading"
    class="py-3 bg-blue-600 text-white rounded-md font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer transition-colors"
  >
    {{ isLoading ? ('REGISTER.LOADING' | translate) : ('REGISTER.SUBMIT' | translate) }}
  </button>

  <a routerLink="/login" class="text-center text-sm text-blue-600 hover:underline cursor-pointer">
    {{ 'REGISTER.LOGIN_LINK' | translate }}
  </a>
</form>
