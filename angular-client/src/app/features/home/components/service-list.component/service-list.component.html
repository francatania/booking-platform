<div class="bg-white rounded-lg shadow overflow-hidden">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Service</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Description</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Duration</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Price</th>
        <th class="px-6 py-3"></th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
      @for (service of services; track service.id) {
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="px-6 py-4 font-medium text-gray-900">{{ service.name }}</td>
          <td class="px-6 py-4 text-gray-500">{{ service.description }}</td>
          <td class="px-6 py-4 text-gray-500">{{ service.durationMinutes }} mins</td>
          <td class="px-6 py-4 text-gray-900">${{ service.price }}</td>
          <td class="px-6 py-4 text-right">
            <button class="px-4 py-2 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700 transition-colors cursor-pointer"
            (click)="onServiceSelected(service)">
              Book
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>

  <div class="px-6 py-4 flex items-center justify-between border-t border-gray-200">
    <span class="text-sm text-gray-500">Page {{ currentPage + 1 }} of {{ totalPages }}</span>
    <div class="flex gap-2">
      <button
        [disabled]="currentPage === 0"
        class="px-3 py-1 text-sm border border-gray-300 rounded-md hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed cursor-pointer"
        (click)="goToPreviousPage()"
      >
        Previous
      </button>
      <button
        [disabled]="currentPage + 1 >= totalPages"
        class="px-3 py-1 text-sm border border-gray-300 rounded-md hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed cursor-pointer"
        (click)="goToNextPage()"
      >
        Next
      </button>
    </div>
  </div>
</div>
