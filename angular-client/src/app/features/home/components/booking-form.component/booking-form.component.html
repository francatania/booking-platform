<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
    <h2 class="text-xl font-bold text-gray-800 mb-1">Book Service</h2>
    <p class="text-sm text-gray-500 mb-6">{{ service.name }} · {{ service.durationMinutes }} mins</p>

    <form #bookingForm="ngForm" (ngSubmit)="onBooking(bookingForm)" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label for="date" class="font-semibold text-gray-700 text-sm">Date</label>
        <input
          id="date"
          type="date"
          name="date"
            [min]="today"
          [(ngModel)]="date"
          required
          class="px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label for="startTime" class="font-semibold text-gray-700 text-sm">Start Time</label>
        <select
          id="startTime"
          name="startTime"
          [(ngModel)]="startTime"
          required
          class="px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
        >
          <option value="">Select a time</option>
          @for (slot of timeSlots; track slot) {
            <option [value]="slot">{{ slot }}</option>
          }
        </select>
      </div>

      <div class="flex flex-col gap-1">
        <label class="font-semibold text-gray-700 text-sm">End Time</label>
        <input
          type="text"
          [value]="computedEndTime"
          disabled
          class="px-4 py-2 border border-gray-200 rounded-md bg-gray-50 text-gray-500"
        />
      </div>

      @if (errorMessage) {
        <div class="text-sm text-red-600 bg-red-50 p-3 rounded-md">{{ errorMessage }}</div>
      }

      <div class="flex gap-3 mt-2">
        <button
          type="button"
          (click)="cancelled.emit()"
          class="flex-1 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition-colors cursor-pointer"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="bookingForm.invalid || isLoading"
          class="flex-1 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors cursor-pointer"
        >
          {{ isLoading ? 'Booking...' : 'Confirm Booking' }}
        </button>
      </div>
    </form>
  </div>
</div>
