@if (toast) {
  <div class="fixed top-4 right-4 z-50 flex items-start gap-3 px-4 py-3 rounded-lg shadow-lg min-w-72 max-w-sm"
    [class]="toast.type === 'success' ? 'bg-green-50 border border-green-200 text-green-800'
           : toast.type === 'error'   ? 'bg-red-50 border border-red-200 text-red-800'
           : 'bg-yellow-50 border border-yellow-200 text-yellow-800'"
  >
    <span class="text-sm flex-1">{{ toast.message }}</span>
    <button (click)="dismiss()" class="text-current opacity-50 hover:opacity-100 cursor-pointer">✕</button>
  </div>
}
