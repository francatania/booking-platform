spring.application.name=auth-service
server.port=8081

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
spring.datasource.username=${DB_USER:franco}
spring.datasource.password=${DB_PASSWORD:franco123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

jwt.secret=${JWT_SECRET:mySecretKey1234567890mySecretKey1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}
