services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: franco
      POSTGRES_PASSWORD: franco123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U franco"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: franco
      DB_PASSWORD: franco123
      JWT_SECRET: mySecretKey1234567890mySecretKey1234567890
    depends_on:
      postgres:
        condition: service_healthy

  company-service:
    build: ./company-service
    container_name: company-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: company_db
      DB_USER: franco
      DB_PASSWORD: franco123
      JWT_SECRET: mySecretKey1234567890mySecretKey1234567890
    depends_on:
      postgres:
        condition: service_healthy

  booking-service:
    build: ./booking-service
    container_name: booking-service
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: booking_db
      DB_USER: franco
      DB_PASSWORD: franco123
      JWT_SECRET: mySecretKey1234567890mySecretKey1234567890
      COMPANY_SERVICE_URL: http://company-service:8082/api
      AUTH_SERVICE_URL: http://auth-service:8081/api
      RABBITMQ_URL: amqp://franco:franco123@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: franco
      RABBITMQ_DEFAULT_PASS: franco123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 3s
      retries: 5

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: notification_db
      DB_USER: franco
      DB_PASSWORD: franco123
      JWT_SECRET: mySecretKey1234567890mySecretKey1234567890
      RABBITMQ_URL: amqp://franco:franco123@rabbitmq:5672/
      AUTH_SERVICE_URL: http://auth-service:8081/api
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_USER}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - company-service
      - booking-service
      - notification-service

volumes:
  postgres_data:
  rabbitmq_data:
